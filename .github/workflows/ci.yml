name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      NEXT_PUBLIC_FACTORY_CONTRACT_ID: CC56AKO3H3FJS3O6C4MKJK4QTHPXLZQMUPVRVZUXRYPYMO65AD3LNVUL
      NEXT_PUBLIC_ESCROW_CONTRACT_ID: CCXUWIED3RKTFDZQH75D7BMG2N73VNNYQZSCX6KCAHIPRSPROOXTIXH7
      NEXT_PUBLIC_REFUND_MANAGER_CONTRACT_ID: CBXSHHMMQSNX35R6BEHBT63I2BQEJFIBLKW5NMEC4ZNR4OQDO5YGWOXY
      NEXT_PUBLIC_INVESTMENT_CAMPAIGN_WASM_HASH: ed27f0f147d633bf29f4e5e37c119b24c62fce499447b5b2ee0392e1516bf69b
      NEXT_PUBLIC_XLM_TOKEN_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
      NEXT_PUBLIC_STELLAR_READ_SOURCE_ACCOUNT: GCK7A2SQAHZVIMAE3FWZLNWBUH3UQUCHBGEAOGSZOEZAYPNP3OBAFWLE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  contracts:
    name: Contract tests and WASM build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Build contract WASM artifacts
        run: cargo build --workspace --target wasm32v1-none --release

      - name: Run contract tests
        run: cargo test --workspace

  deploy:
    name: Deploy web to Netlify
    runs-on: ubuntu-latest
    needs:
      - frontend
      - contracts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_NETLIFY_DEPLOY == 'true'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Netlify CLI
        run: npm install --global netlify-cli@latest

      - name: Deploy to Netlify
        run: netlify deploy --build --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
